<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gate Alert System</title>
<style>
:root{
  --navy:#0A1628;--teal:#00C8DC;--card:#0F2240;--sec:#1A3A5C;
  --success:#22C55E;--warn:#F59E0B;--danger:#EF4444;
  --gray1:#F1F5F9;--gray4:#94A3B8;--gray6:#475569;--gray8:#1E293B;
  --white:#fff;--text:#E8F4F8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--navy);color:var(--text);min-height:100vh}
a{color:var(--teal);text-decoration:none}

/* ── Layout ── */
#app{display:flex;flex-direction:column;min-height:100vh}
#topbar{background:var(--card);border-bottom:1px solid rgba(0,200,220,.2);
  padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#topbar h1{font-size:20px;font-weight:800;color:var(--teal);letter-spacing:1px}
#topbar .right{display:flex;align-items:center;gap:12px}
#user-badge{background:rgba(0,200,220,.12);border:1px solid rgba(0,200,220,.3);
  padding:5px 14px;border-radius:999px;font-size:13px;color:var(--teal);font-weight:600}
#logout-btn{background:transparent;border:1px solid var(--danger);color:var(--danger);
  padding:5px 14px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:600}
#logout-btn:hover{background:var(--danger);color:var(--white)}

.main{display:flex;flex:1}
#sidebar{width:220px;background:var(--card);border-right:1px solid rgba(0,200,220,.15);
  padding:24px 0;flex-shrink:0}
#sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;
  cursor:pointer;font-size:14px;font-weight:600;color:var(--gray4);transition:.15s}
#sidebar .nav-item:hover{background:rgba(0,200,220,.08);color:var(--white)}
#sidebar .nav-item.active{background:rgba(0,200,220,.14);color:var(--teal);
  border-right:3px solid var(--teal)}
#sidebar .nav-item .icon{font-size:18px;width:22px;text-align:center}

#content{flex:1;padding:28px;overflow-y:auto}

/* ── Auth ── */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:linear-gradient(135deg,var(--navy) 0%,#0F2240 50%,var(--sec) 100%)}
.auth-card{background:var(--card);border:1px solid rgba(0,200,220,.2);border-radius:20px;
  padding:40px;width:100%;max-width:420px}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .shield{font-size:52px}
.auth-logo h2{font-size:28px;font-weight:800;color:var(--white);margin-top:8px}
.auth-logo p{color:var(--gray4);font-size:13px}
.tabs{display:flex;background:rgba(255,255,255,.05);border-radius:999px;padding:4px;margin-bottom:24px}
.tab-btn{flex:1;text-align:center;padding:8px;border-radius:999px;cursor:pointer;
  font-size:14px;font-weight:600;color:var(--gray4);transition:.15s;border:none;background:transparent}
.tab-btn.active{background:var(--teal);color:var(--navy)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:var(--gray4);margin-bottom:6px;font-weight:600;letter-spacing:.05em}
.form-group input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(0,200,220,.25);
  border-radius:10px;padding:12px 14px;color:var(--white);font-size:14px;outline:none;transition:.15s}
.form-group input:focus{border-color:var(--teal);background:rgba(0,200,220,.06)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:none;cursor:pointer;font-weight:700;transition:.15s;font-size:14px}
.btn-primary{background:var(--teal);color:var(--navy);padding:13px 24px;border-radius:999px;width:100%}
.btn-primary:hover{opacity:.88}
.btn-sm{padding:6px 14px;border-radius:999px;font-size:12px}
.btn-success{background:var(--success);color:var(--white)}
.btn-danger{background:var(--danger);color:var(--white)}
.btn-warn{background:var(--warn);color:var(--navy)}
.btn-outline{background:transparent;border:1px solid var(--teal);color:var(--teal)}
.btn-outline:hover{background:var(--teal);color:var(--navy)}
.error-msg{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);
  color:var(--danger);padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px}

/* ── Cards ── */
.card{background:var(--card);border:1px solid rgba(0,200,220,.12);border-radius:16px;padding:20px}
.card-title{font-size:13px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.07em;margin-bottom:16px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid rgba(0,200,220,.15);border-radius:14px;
  padding:18px;text-align:center}
.stat-val{font-size:32px;font-weight:800;color:var(--white)}
.stat-lbl{font-size:12px;color:var(--gray4);margin-top:4px}
.stat-icon{font-size:24px;margin-bottom:6px}

/* ── Table / List ── */
.table{width:100%;border-collapse:collapse}
.table th{font-size:11px;color:var(--gray4);font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.07);text-align:left}
.table td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;vertical-align:middle}
.table tr:hover td{background:rgba(0,200,220,.04)}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700}
.badge-success{background:rgba(34,197,94,.15);color:var(--success)}
.badge-danger{background:rgba(239,68,68,.15);color:var(--danger)}
.badge-warn{background:rgba(245,158,11,.15);color:var(--warn)}
.badge-teal{background:rgba(0,200,220,.15);color:var(--teal)}
.badge-gray{background:rgba(148,163,184,.12);color:var(--gray4)}

/* ── Gate alert overlay ── */
#gate-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:999;align-items:center;justify-content:center}
#gate-overlay.show{display:flex}
.gate-popup{background:var(--white);border-radius:24px;padding:40px;text-align:center;
  max-width:380px;width:90%;animation:pop .3s ease-out}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.gate-popup .gate-icon{font-size:56px;margin-bottom:12px;animation:shake 0.5s infinite alternate}
@keyframes shake{from{transform:rotate(-8deg)}to{transform:rotate(8deg)}}
.gate-popup h2{font-size:26px;font-weight:800;color:#0A1628;margin-bottom:8px}
.gate-popup p{color:#475569;margin-bottom:6px;font-size:15px}
.gate-popup .time{color:#94A3B8;font-size:12px;margin-bottom:24px}
.gate-popup .ack-btn{background:#22C55E;color:#fff;border:none;padding:14px 32px;
  border-radius:999px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-bottom:10px}
.gate-popup .dis-btn{background:transparent;border:none;color:#94A3B8;cursor:pointer;font-size:13px}

/* ── Misc ── */
.page-title{font-size:26px;font-weight:800;color:var(--white);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--gray4);margin-bottom:24px}
.section-title{font-size:15px;font-weight:700;color:var(--white);margin-bottom:14px;margin-top:24px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.col{flex:1;min-width:280px}
.key-box{background:rgba(0,200,220,.08);border:1px solid rgba(0,200,220,.25);
  border-radius:10px;padding:12px 16px;font-family:monospace;font-size:14px;color:var(--teal);
  display:flex;align-items:center;justify-content:space-between;gap:8px;word-break:break-all}
.copy-btn{background:rgba(0,200,220,.15);border:none;color:var(--teal);padding:5px 10px;
  border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;flex-shrink:0}
.copy-btn:hover{background:var(--teal);color:var(--navy)}
.event-row{display:flex;align-items:center;gap:12px;padding:12px;
  background:rgba(255,255,255,.03);border-radius:10px;margin-bottom:8px;border:1px solid rgba(255,255,255,.05)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.online-dot{background:var(--success);box-shadow:0 0 6px var(--success);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
input,select,textarea{font-family:inherit}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
  align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid rgba(0,200,220,.2);border-radius:20px 20px 0 0;
  padding:28px;width:100%;max-width:480px}
.modal h3{font-size:17px;font-weight:700;color:var(--white);margin-bottom:18px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pin-row{display:flex;gap:12px;justify-content:center;margin:16px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--teal);transition:.15s}
.pin-dot.filled{background:var(--teal)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto}
.num-key{background:rgba(0,200,220,.1);border:none;color:var(--white);border-radius:50%;
  width:68px;height:68px;font-size:20px;font-weight:600;cursor:pointer;transition:.15s}
.num-key:hover{background:rgba(0,200,220,.25)}
.num-key.empty{background:transparent;cursor:default}
.pin-error{color:var(--danger);font-size:13px;text-align:center;margin-top:4px}
.hidden{display:none}
</style>
</head>
<body>
<div id="app">

<!-- ── AUTH SCREEN ─────────────────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="shield">🛡️</div>
      <h2>Gate Alert</h2>
      <p>Secure Family Network</p>
    </div>
    <div id="auth-error" class="error-msg hidden"></div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>
    <!-- Login -->
    <div id="login-form">
      <div class="form-group"><label>Your Name</label><input id="l-name" placeholder="e.g. Mirza Bilal" autocomplete="off"/></div>
      <div class="form-group"><label>Password</label><input id="l-pass" type="password" placeholder="••••••••"/></div>
      <button class="btn btn-primary" onclick="doLogin()">Sign In →</button>
    </div>
    <!-- Register -->
    <div id="register-form" class="hidden">
      <div class="form-group"><label>Full Name</label><input id="r-name" placeholder="Your full name"/></div>
      <div class="form-group"><label>Invite Key</label><input id="r-key" placeholder="Key from your admin"/></div>
      <div class="form-group"><label>Password</label><input id="r-pass" type="password" placeholder="••••••••"/></div>
      <div class="form-group"><label>Confirm Password</label><input id="r-pass2" type="password" placeholder="••••••••"/></div>
      <button class="btn btn-primary" onclick="doRegister()">Create Account →</button>
    </div>
  </div>
</div>

<!-- ── MAIN APP ─────────────────────────────────────────────────────────── -->
<div id="main-app" class="hidden" style="display:none;flex-direction:column;min-height:100vh">
  <div id="topbar">
    <h1>🚪 Gate Alert</h1>
    <div class="right">
      <span id="user-badge">Loading…</span>
      <button id="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="main">
    <div id="sidebar"></div>
    <div id="content"></div>
  </div>
</div>

<!-- ── GATE ALERT OVERLAY ───────────────────────────────────────────────── -->
<div id="gate-overlay">
  <div class="gate-popup">
    <div class="gate-icon">🔔</div>
    <h2>Gate Alert!</h2>
    <p id="gate-msg">Someone is at the gate!</p>
    <p id="gate-by" style="color:#94A3B8;font-size:13px"></p>
    <p class="time" id="gate-time"></p>
    <button class="ack-btn" onclick="acknowledgeAlert()">✅ I'll Handle It</button>
    <button class="dis-btn" onclick="dismissAlert()">Dismiss</button>
  </div>
</div>

<!-- ── ADD FAMILY MODAL ─────────────────────────────────────────────────── -->
<div class="modal-bg" id="add-fam-modal">
  <div class="modal">
    <h3>➕ Add New Family</h3>
    <div class="form-row">
      <div class="form-group"><label>Family Name</label><input id="fam-name" placeholder="e.g. Babar Family"/></div>
      <div class="form-group"><label>Admin Name</label><input id="fam-admin" placeholder="Admin's full name"/></div>
    </div>
    <div class="form-group" style="max-width:160px"><label>Max Devices</label>
      <input id="fam-max" type="number" value="4" min="1" max="20"/>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary" style="flex:1" onclick="submitAddFamily()">Create Family</button>
      <button class="btn btn-sm btn-danger" onclick="closeModal('add-fam-modal')">Cancel</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════
const API = window.location.origin;
let token = localStorage.getItem('ga_token') || '';
let currentUser = null;
let ws = null;
let activeEventId = null;
let currentPage = 'home';
const ADMIN_PIN = '1234';
let pinUnlocked = {};

// ═══════════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════════
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(t==='login'?0:1)));
  document.getElementById('login-form').classList.toggle('hidden', t!=='login');
  document.getElementById('register-form').classList.toggle('hidden', t==='login');
  hideAuthError();
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.classList.remove('hidden');
}
function hideAuthError() { document.getElementById('auth-error').classList.add('hidden'); }

async function doLogin() {
  const name = document.getElementById('l-name').value.trim();
  const password = document.getElementById('l-pass').value;
  if (!name || !password) return showAuthError('Please fill in all fields.');
  try {
    const res = await post('/api/auth/login', {name, password});
    token = res.access_token;
    localStorage.setItem('ga_token', token);
    currentUser = {id: res.user_id, name: res.name, role: res.role};
    enterApp();
  } catch(e) { showAuthError(e.detail || 'Invalid name or password.'); }
}

async function doRegister() {
  const name = document.getElementById('r-name').value.trim();
  const invite_key = document.getElementById('r-key').value.trim();
  const password = document.getElementById('r-pass').value;
  const pass2 = document.getElementById('r-pass2').value;
  if (!name||!invite_key||!password) return showAuthError('All fields required.');
  if (password !== pass2) return showAuthError('Passwords do not match.');
  try {
    const res = await post('/api/auth/register', {name, password, invite_key});
    token = res.access_token;
    localStorage.setItem('ga_token', token);
    currentUser = {id: res.user_id, name: res.name, role: res.role};
    enterApp();
  } catch(e) { showAuthError(e.detail || 'Registration failed.'); }
}

function doLogout() {
  if (!confirm('Sign out?')) return;
  token = ''; currentUser = null;
  localStorage.removeItem('ga_token');
  if (ws) ws.close();
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('main-app').style.display='none';
  document.getElementById('l-name').value='';
  document.getElementById('l-pass').value='';
}

// ═══════════════════════════════════════════════════════════════════
// APP ENTRY
// ═══════════════════════════════════════════════════════════════════
async function enterApp() {
  hideAuthError();
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('main-app').style.display='flex';
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('user-badge').textContent = currentUser.name + ' · ' + roleLabel(currentUser.role);
  buildSidebar();
  connectWS();
  navigateTo('home');
}

function roleLabel(r) {
  return {super_admin:'⭐ Super Admin', family_admin:'👑 Family Admin', member:'👤 Member'}[r] || r;
}

function buildSidebar() {
  const pages = [
    {id:'home',        icon:'🏠', label:'Home'},
    {id:'schedule',    icon:'📅', label:'Schedule'},
    {id:'devices',     icon:'📱', label:'Devices'},
    {id:'notifications',icon:'🔔', label:'Notifications'},
    {id:'profile',     icon:'👤', label:'Profile'},
  ];
  if (currentUser.role === 'super_admin')  pages.splice(1,0,{id:'admin',     icon:'🛡️', label:'Admin'});
  if (currentUser.role === 'family_admin') pages.splice(1,0,{id:'familyadmin',icon:'👨‍👩‍👧', label:'My Family'});

  document.getElementById('sidebar').innerHTML = pages.map(p=>`
    <div class="nav-item ${currentPage===p.id?'active':''}" onclick="navigateTo('${p.id}')" id="nav-${p.id}">
      <span class="icon">${p.icon}</span>${p.label}
    </div>`).join('');
}

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.toggle('active', n.id==='nav-'+page);
  });
  const content = document.getElementById('content');
  content.innerHTML = '<div style="color:var(--gray4);padding:40px;text-align:center">Loading…</div>';
  ({
    home:         renderHome,
    admin:        renderAdmin,
    familyadmin:  renderFamilyAdmin,
    schedule:     renderSchedule,
    devices:      renderDevices,
    notifications:renderNotifications,
    profile:      renderProfile,
  }[page] || renderHome)();
}

// ═══════════════════════════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════════════════════════
function connectWS() {
  const wsUrl = API.replace(/^http/, 'ws') + '/api/gate/ws';
  try {
    ws = new WebSocket(wsUrl);
    ws.onmessage = e => {
      try {
        const d = JSON.parse(e.data);
        if (d.type === 'GATE_ALERT') showGateAlert(d);
      } catch(_){}
    };
    ws.onclose = () => setTimeout(connectWS, 3000);
    ws.onerror = () => {};
    setInterval(()=>{ if(ws&&ws.readyState===1) ws.send('ping'); }, 25000);
  } catch(_) {}
}

function showGateAlert(data) {
  activeEventId = data.event_id;
  document.getElementById('gate-msg').textContent = data.message || 'Someone is at the gate!';
  document.getElementById('gate-by').textContent = data.triggered_by ? 'Triggered by: '+data.triggered_by : '';
  document.getElementById('gate-time').textContent = new Date(data.timestamp).toLocaleTimeString();
  document.getElementById('gate-overlay').classList.add('show');
  // Audio beep
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,300,600].forEach(delay=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=880; g.gain.setValueAtTime(.4,ctx.currentTime+delay/1000);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+delay/1000+.3);
      o.start(ctx.currentTime+delay/1000); o.stop(ctx.currentTime+delay/1000+.3);
    });
  } catch(_){}
}

async function acknowledgeAlert() {
  if (activeEventId) {
    try { await post(`/api/gate/acknowledge/${activeEventId}`, {}); } catch(_){}
  }
  document.getElementById('gate-overlay').classList.remove('show');
  if (currentPage === 'home') renderHome();
}
function dismissAlert() {
  document.getElementById('gate-overlay').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════════════
async function renderHome() {
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="page-title">Welcome, ${currentUser.name.split(' ')[0]} 👋</div>
    <div class="page-sub">Gate Alert is active and monitoring</div>
    <div class="stats-grid" id="home-stats">
      <div class="stat-card"><div class="stat-icon">🟢</div><div class="stat-val" id="stat-status">Online</div><div class="stat-lbl">System Status</div></div>
    </div>
    ${(currentUser.role==='super_admin'||currentUser.role==='family_admin')?`
    <div style="margin-bottom:24px">
      <button class="btn btn-warn" onclick="triggerGate()" style="font-size:15px;padding:14px 28px;border-radius:999px">
        🔔 Send Gate Alert
      </button>
    </div>`:''}
    <div class="section-title">Recent Gate Events</div>
    <div id="events-list"><div style="color:var(--gray4)">Loading…</div></div>
  `;
  try {
    const events = await get('/api/gate/events?limit=15');
    const el = document.getElementById('events-list');
    if (!events.length) { el.innerHTML='<div style="color:var(--gray4);padding:20px 0">No events yet</div>'; return; }
    el.innerHTML = events.map(ev=>`
      <div class="event-row">
        <div class="dot" style="background:${ev.acknowledged?'var(--success)':'var(--warn)'}"></div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:14px">${ev.message}</div>
          <div style="font-size:12px;color:var(--gray4);margin-top:2px">
            ${ev.triggered_by} · ${new Date(ev.created_at).toLocaleString()}
          </div>
        </div>
        <span class="badge ${ev.acknowledged?'badge-success':'badge-warn'}">${ev.acknowledged?'✔ Handled':'⏳ Pending'}</span>
      </div>`).join('');
  } catch(_) {}
}

async function triggerGate() {
  if (!confirm('Send a gate alert to all family members?')) return;
  try {
    await post('/api/gate/trigger', {message:'Someone is at the gate!'});
    alert('Gate alert sent!');
    renderHome();
  } catch(e) { alert('Error: '+e.detail); }
}

// ═══════════════════════════════════════════════════════════════════
// ADMIN (Super Admin)  — PIN locked
// ═══════════════════════════════════════════════════════════════════

// SCHEDULE
// ═══════════════════════════════════════════════════════════════════
let scheduleData = [];
async function renderSchedule() {
  scheduleData = [];
  try { scheduleData = await get('/api/schedule/my'); } catch(_){}
  const today = new Date();
  const year  = today.getFullYear(), month = today.getMonth();
  renderCalendar(year, month);
}

function renderCalendar(year, month) {
  const c = document.getElementById('content');
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = new Date().toISOString().split('T')[0];

  const markedMap = {};
  scheduleData.forEach(s=>{ markedMap[s.date]={unavailable:s.unavailable,note:s.note}; });

  let cells = '';
  for (let i=0;i<firstDay;i++) cells += '<td></td>';
  for (let d=1;d<=daysInMonth;d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const marked  = markedMap[dateStr];
    const isToday = dateStr===todayStr;
    const bg = marked ? (marked.unavailable ? '#ef444422':'#22c55e22') : 'transparent';
    const border = isToday ? '2px solid var(--teal)' : marked ? `2px solid ${marked.unavailable?'var(--danger)':'var(--success)'}` : '1px solid rgba(255,255,255,.06)';
    cells += `<td onclick="selectDay('${dateStr}')" style="cursor:pointer;padding:10px;text-align:center;
      background:${bg};border:${border};border-radius:8px;font-weight:${isToday?700:400};
      color:${isToday?'var(--teal)':'var(--text)'};font-size:14px;user-select:none"
      title="${marked?marked.note||'':''}">
      ${d}${marked?`<div style="font-size:8px;margin-top:2px">${marked.unavailable?'🔴':'🟢'}</div>`:''}
    </td>`;
    if ((firstDay+d)%7===0) cells += '</tr><tr>';
  }

  c.innerHTML = `
    <div class="page-title">📅 Availability Calendar</div>
    <div class="page-sub">Mark dates when you can't handle the gate</div>
    <div class="card" style="max-width:560px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <button class="btn btn-sm btn-outline" onclick="changeMonth(${year},${month},-1)">◀</button>
        <strong style="font-size:16px">${monthNames[month]} ${year}</strong>
        <button class="btn btn-sm btn-outline" onclick="changeMonth(${year},${month},1)">▶</button>
      </div>
      <table style="width:100%;border-collapse:separate;border-spacing:4px">
        <thead><tr>${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<th style="text-align:center;font-size:12px;color:var(--gray4);padding:8px">${d}</th>`).join('')}</tr></thead>
        <tbody><tr>${cells}</tr></tbody>
      </table>
      <div style="display:flex;gap:16px;margin-top:14px;font-size:12px;color:var(--gray4)">
        <span>🔴 Unavailable</span><span>🟢 Available</span><span style="color:var(--teal)">Today highlighted</span>
      </div>
    </div>
    <div id="day-panel" style="max-width:560px;margin-top:16px"></div>`;
}

function changeMonth(year, month, dir) {
  let m=month+dir, y=year;
  if(m<0){m=11;y--;}if(m>11){m=0;y++;}
  renderCalendar(y,m);
}

function selectDay(dateStr) {
  const panel = document.getElementById('day-panel');
  const marked = scheduleData.find(s=>s.date===dateStr);
  panel.innerHTML=`
    <div class="card">
      <div class="card-title">📌 ${dateStr}</div>
      ${marked?`<div style="margin-bottom:12px"><span class="badge ${marked.unavailable?'badge-danger':'badge-success'}">${marked.unavailable?'🔴 Unavailable':'🟢 Available'}</span>${marked.note?` <span style="color:var(--gray4);font-size:13px">— ${marked.note}</span>`:''}</div>`:''}
      <div class="form-group" style="max-width:340px">
        <label>Note (optional)</label>
        <input id="sched-note" placeholder="e.g. travelling, busy" value="${marked?.note||''}"/>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-sm btn-danger" onclick="saveSchedule('${dateStr}',true)">🔴 Mark Unavailable</button>
        <button class="btn btn-sm btn-success" onclick="saveSchedule('${dateStr}',false)">🟢 Mark Available</button>
        ${marked?`<button class="btn btn-sm" style="background:rgba(255,255,255,.08);color:var(--gray4)" onclick="deleteSchedule('${dateStr}')">🗑 Remove</button>`:''}
      </div>
    </div>`;
}

async function saveSchedule(date, unavailable) {
  const note = document.getElementById('sched-note')?.value||'';
  try {
    await post('/api/schedule/',{date,unavailable,note});
    await renderSchedule();
    setTimeout(()=>selectDay(date),100);
  } catch(_){}
}
async function deleteSchedule(date) {
  try { await del(`/api/schedule/${date}`); renderSchedule(); } catch(_){}
}

// PIN LOCK
// ═══════════════════════════════════════════════════════════════════
function renderPin(page, onSuccess) {
  let pinVal = '';
  const c = document.getElementById('content');
  const pageName = page==='admin'?'Admin Dashboard':'Family Dashboard';
  c.innerHTML=`
    <div style="display:flex;justify-content:center;align-items:center;min-height:60vh">
      <div class="card" style="max-width:340px;width:100%;text-align:center">
        <div style="font-size:44px;margin-bottom:12px">🔒</div>
        <div style="font-size:20px;font-weight:700;color:var(--white);margin-bottom:6px">${pageName}</div>
        <div style="font-size:13px;color:var(--gray4);margin-bottom:20px">Enter your PIN to continue</div>
        <div class="pin-row" id="pin-dots">
          ${[0,1,2,3].map(i=>`<div class="pin-dot" id="pd-${i}"></div>`).join('')}
        </div>
        <div id="pin-err" class="pin-error hidden">Incorrect PIN</div>
        <div class="numpad" style="margin-top:16px">
          ${['1','2','3','4','5','6','7','8','9','','0','⌫'].map(k=>
            k?`<button class="num-key" onclick="pinKey('${k}')">${k}</button>`
             :`<button class="num-key empty"></button>`
          ).join('')}
        </div>
      </div>
    </div>`;

  window._pinVal = '';
  window._pinSuccess = () => { pinUnlocked[page]=true; onSuccess(); };

  window.pinKey = (k) => {
    if (k==='⌫') { window._pinVal=window._pinVal.slice(0,-1); }
    else if (window._pinVal.length<4) { window._pinVal+=k; }
    for(let i=0;i<4;i++){
      const d=document.getElementById('pd-'+i);
      if(d) d.classList.toggle('filled', i<window._pinVal.length);
    }
    const errEl=document.getElementById('pin-err');
    if(errEl) errEl.classList.add('hidden');
    if(window._pinVal.length===4) {
      setTimeout(()=>{
        if(window._pinVal===ADMIN_PIN){ window._pinSuccess(); }
        else{
          window._pinVal='';
          for(let i=0;i<4;i++){const d=document.getElementById('pd-'+i);if(d)d.classList.remove('filled');}
          const e=document.getElementById('pin-err');if(e)e.classList.remove('hidden');
        }
      },120);
    }
  };
}

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════
async function get(path) {
  const r = await fetch(API+path, {headers:{Authorization:`Bearer ${token}`}});
  if (!r.ok) { const e=await r.json(); throw e; }
  return r.json();
}
async function post(path, body) {
  const r = await fetch(API+path, {
    method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
    body: JSON.stringify(body)
  });
  if (!r.ok) { const e=await r.json(); throw e; }
  return r.json();
}
async function patch(path, body) {
  const r = await fetch(API+path, {
    method:'PATCH', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
    body: JSON.stringify(body)
  });
  if (!r.ok) { const e=await r.json(); throw e; }
  return r.json();
}
async function del(path) {
  const r = await fetch(API+path, {method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
  if (!r.ok) { const e=await r.json(); throw e; }
  return r.json();
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(()=>alert('Copied!')).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); alert('Copied!');
  });
}

function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ── Auto-login on reload ────────────────────────────────────────────
window.addEventListener('load', async () => {
  if (token) {
    try {
      const res = await get('/api/auth/me');
      currentUser = {id:res.id, name:res.name, role:res.role};
      enterApp();
    } catch(_) { token=''; localStorage.removeItem('ga_token'); }
  }
});
